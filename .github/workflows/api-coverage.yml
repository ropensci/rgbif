on:
  # Run weekly on Mondays at 9 AM UTC
  schedule:
    - cron: '0 9 * * 1'
  # Allow manual trigger with choice of action
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - check-coverage
          - process-actions
        default: 'check-coverage'
      dry_run:
        description: 'Dry run (for process-actions only - do not create issues or commit)'
        required: false
        type: boolean
        default: false
  # Run on pushes to mapping files (automatic coverage check)
  push:
    branches:
      - master
      - main
      - feature/autocheck-missing-endpoints
    paths:
      - '.github/coverage-reports/api-mapping.json'
      - '.github/coverage-reports/check-api-coverage.R'
      - '.github/workflows/api-coverage.yml'

name: API Coverage Management

permissions:
  contents: write
  issues: write

jobs:
  check-coverage:
    runs-on: ubuntu-latest
    name: Check GBIF API Coverage
    # Run on schedule, push, or when action is 'check-coverage'
    if: github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'check-coverage')
    
    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Setup GitHub CLI
        run: |
          # Upgrade gh CLI to latest version to support --json flag
          type -p wget >/dev/null || (sudo apt update && sudo apt-get install wget -y)
          sudo mkdir -p -m 755 /etc/apt/keyrings
          wget -qO- https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null
          sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y
        
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev
          
      - name: Install R dependencies
        run: |
          install.packages(c("jsonlite", "httr"), repos = "https://cloud.r-project.org")
        shell: Rscript {0}
        
      - name: Run API coverage check
        id: coverage_check
        run: |
          Rscript .github/coverage-reports/check-api-coverage.R
        continue-on-error: true
        
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-reports
          path: .github/coverage-reports/
          retention-days: 90
          
      - name: Read coverage summary
        if: always()
        id: read_summary
        run: |
          if [ -f .github/coverage-reports/coverage-report.json ]; then
            COVERAGE=$(cat .github/coverage-reports/coverage-report.json | grep -o '"coverage_percentage":[0-9.]*' | cut -d':' -f2)
            MISSING=$(cat .github/coverage-reports/coverage-report.json | grep -o '"missing_endpoints":[0-9]*' | cut -d':' -f2)
            echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
            echo "missing=$MISSING" >> $GITHUB_OUTPUT
            echo "### API Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
            echo "Missing Endpoints: $MISSING" >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage report not found" >> $GITHUB_STEP_SUMMARY
          fi
          
      - name: Comment coverage summary
        if: github.event_name == 'push' && always()
        run: |
          if [ -f .github/coverage-reports/coverage-report.md ]; then
            echo "Coverage report generated successfully"
            # Optionally: post as PR comment or issue comment
            # This would require additional setup with GitHub token
          fi
          
      - name: Check coverage threshold
        if: always()
        run: |
          THRESHOLD=50
          if [ -f .github/coverage-reports/coverage-report.json ]; then
            COVERAGE=$(cat .github/coverage-reports/coverage-report.json | grep -o '"coverage_percentage":[0-9.]*' | cut -d':' -f2 | awk '{print int($1)}')
            echo "Current coverage: ${COVERAGE}%"
            echo "Threshold: ${THRESHOLD}%"
            if [ "$COVERAGE" -lt "$THRESHOLD" ]; then
              echo "[WARNING] Coverage (${COVERAGE}%) is below threshold (${THRESHOLD}%)"
              # Uncomment to fail the workflow if below threshold:
              # exit 1
            else
              echo "[OK] Coverage is above threshold"
            fi
          fi
          
      - name: Commit updated coverage report
        if: github.event_name == 'push' || github.event_name == 'schedule'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Check if coverage report files exist and have changed
          FILES_TO_COMMIT=""
          if [ -f .github/coverage-reports/coverage-report.md ]; then
            FILES_TO_COMMIT="$FILES_TO_COMMIT .github/coverage-reports/coverage-report.md"
          fi
          if [ -f .github/coverage-reports/coverage-report.json ]; then
            FILES_TO_COMMIT="$FILES_TO_COMMIT .github/coverage-reports/coverage-report.json"
          fi
          
          if [ -z "$FILES_TO_COMMIT" ]; then
            echo "No coverage report files found to commit"
          elif git diff --quiet HEAD -- $FILES_TO_COMMIT 2>/dev/null; then
            echo "Coverage report unchanged"
          else
            git add $FILES_TO_COMMIT
            git commit -m "chore: update API coverage report [skip ci]"
            git push
            echo "[OK] Committed updated coverage report" >> $GITHUB_STEP_SUMMARY
          fi
          
      - name: Ensure labels exist
        if: always()
        run: |
          # Create labels if they don't exist
          gh label create "api-coverage-report" --description "Automated API coverage report" --color "0E8A16" --force || true
          gh label create "documentation" --description "Documentation related" --color "0075CA" --force || true
          gh label create "api-coverage" --description "API coverage related" --color "1D76DB" --force || true
          gh label create "enhancement" --description "New feature or request" --color "A2EEEF" --force || true
          gh label create "endpoint" --description "Missing API endpoint" --color "D93F0B" --force || true
          gh label create "parameter" --description "Missing parameter" --color "FBCA04" --force || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Create or update coverage report issue
        if: always()
        run: |
          set -e  # Exit on error
          
          echo "Checking for existing coverage report issue..."
          
          # Check if coverage report issue already exists
          ISSUE_URL=$(gh issue list \
            --label "api-coverage-report" \
            --state open \
            --limit 1 \
            2>/dev/null | head -n 1 | awk '{print $1}' || echo "")
          
          if [ -n "$ISSUE_URL" ]; then
            ISSUE_NUMBER="${ISSUE_URL##*/}"
          else
            ISSUE_NUMBER=""
          fi
          
          echo "Existing issue number: $ISSUE_NUMBER"
          
          # Read the coverage report
          if [ ! -f .github/coverage-reports/coverage-report.md ]; then
            echo "ERROR: Coverage report not found"
            exit 1
          fi
          
          echo "Reading coverage report..."
          # Prepare issue body
          REPORT_CONTENT=$(cat .github/coverage-reports/coverage-report.md)
          
          # Build issue body using echo to avoid YAML parsing issues
          {
            echo "# API Coverage Report"
            echo ""
            echo "---"
            echo ""
            echo "$REPORT_CONTENT"
            echo ""
            echo "---"
            echo ""
            echo "**Note:** This issue is automatically updated when the coverage check runs."
          } > /tmp/issue-body.md
          
          if [ -n "$ISSUE_NUMBER" ] && [ "$ISSUE_NUMBER" != "null" ] && [ "$ISSUE_NUMBER" != "" ]; then
            # Update existing issue
            echo "Updating existing issue #$ISSUE_NUMBER..."
            if gh issue edit "$ISSUE_NUMBER" --body-file /tmp/issue-body.md; then
              echo "[OK] Updated coverage report issue #$ISSUE_NUMBER" >> $GITHUB_STEP_SUMMARY
              echo "View issue: https://github.com/${{ github.repository }}/issues/$ISSUE_NUMBER" >> $GITHUB_STEP_SUMMARY
              echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
            else
              echo "[ERROR] Failed to update issue #$ISSUE_NUMBER" >> $GITHUB_STEP_SUMMARY
              exit 1
            fi
          else
            # Create new issue
            echo "Creating new coverage report issue..."
            ISSUE_URL=$(gh issue create \
              --title "API Coverage Report - $(date +%Y-%m-%d)" \
              --body-file /tmp/issue-body.md \
              --label "api-coverage-report" \
              --label "documentation")
            
            if [ -n "$ISSUE_URL" ]; then
              ISSUE_NUMBER="${ISSUE_URL##*/}"
              echo "[OK] Created coverage report issue #$ISSUE_NUMBER" >> $GITHUB_STEP_SUMMARY
              echo "View issue: $ISSUE_URL" >> $GITHUB_STEP_SUMMARY
              echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
            else
              echo "[ERROR] Failed to create issue" >> $GITHUB_STEP_SUMMARY
              exit 1
            fi
          fi
          
          # Clean up temp file
          rm -f /tmp/issue-body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  process-actions:
    runs-on: ubuntu-latest
    name: Process Coverage Report Actions
    # Only run when manually triggered with 'process-actions'
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'process-actions'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup GitHub CLI
        run: |
          # Upgrade gh CLI to latest version to support --json flag
          type -p wget >/dev/null || (sudo apt update && sudo apt-get install wget -y)
          sudo mkdir -p -m 755 /etc/apt/keyrings
          wget -qO- https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null
          sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y
          
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          
      - name: Install R dependencies
        run: |
          install.packages("jsonlite", repos = "https://cloud.r-project.org")
        shell: Rscript {0}
        
      - name: Ensure labels exist
        run: |
          # Create labels if they don't exist (needed for issue creation)
          gh label create "api-coverage-report" --description "Automated API coverage report" --color "0E8A16" --force || true
          gh label create "documentation" --description "Documentation related" --color "0075CA" --force || true
          gh label create "api-coverage" --description "API coverage related" --color "1D76DB" --force || true
          gh label create "enhancement" --description "New feature or request" --color "A2EEEF" --force || true
          gh label create "endpoint" --description "Missing API endpoint" --color "D93F0B" --force || true
          gh label create "parameter" --description "Missing parameter" --color "FBCA04" --force || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Find coverage report issue
        id: find_issue
        run: |
          # Find the open coverage report issue
          ISSUE_URL=$(gh issue list \
            --label "api-coverage-report" \
            --state open \
            --limit 1 \
            2>/dev/null | head -n 1 | awk '{print $1}' || echo "")
          
          if [ -n "$ISSUE_URL" ]; then
            ISSUE_NUMBER="${ISSUE_URL##*/}"
          else
            ISSUE_NUMBER=""
          fi
          
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "[ERROR] No open coverage report issue found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please run the 'check-coverage' action first to generate a coverage report issue." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          echo "Found coverage report issue: #$ISSUE_NUMBER" >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Process checkboxes from issue
        id: process
        run: |
          Rscript .github/coverage-reports/process-coverage-issue.R
          
          # Capture statistics
          if [ -f .github/coverage-reports/actions-to-take.json ]; then
            NUM_ISSUES=$(cat .github/coverage-reports/actions-to-take.json | grep -o '"type"' | wc -l)
            echo "num_issues=$NUM_ISSUES" >> $GITHUB_OUTPUT
            echo "### Processing Complete" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Issues to create: $NUM_ISSUES" >> $GITHUB_STEP_SUMMARY
          else
            echo "num_issues=0" >> $GITHUB_OUTPUT
            echo "No actions file created - no checkboxes were checked" >> $GITHUB_STEP_SUMMARY
          fi
        env:
          ISSUE_NUMBER: ${{ steps.find_issue.outputs.issue_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Create GitHub issues
        if: steps.process.outputs.num_issues > 0 && inputs.dry_run == false
        run: |
          # Read the actions file
          ACTIONS_FILE=".github/coverage-reports/actions-to-take.json"
          
          if [ ! -f "$ACTIONS_FILE" ]; then
            echo "No actions file found"
            exit 0
          fi
          
          # Parse JSON and create issues
          NUM_ISSUES=$(cat "$ACTIONS_FILE" | jq '.issues | length')
          echo "Creating $NUM_ISSUES issues..."
          
          for i in $(seq 0 $(($NUM_ISSUES - 1))); do
            TITLE=$(cat "$ACTIONS_FILE" | jq -r ".issues[$i].title")
            TYPE=$(cat "$ACTIONS_FILE" | jq -r ".issues[$i].type")
            LABELS=$(cat "$ACTIONS_FILE" | jq -r ".issues[$i].labels | join(\",\")")
            
            # Build issue body based on type
            if [ "$TYPE" = "endpoint" ]; then
              ENDPOINT=$(cat "$ACTIONS_FILE" | jq -r ".issues[$i].endpoint")
              API=$(cat "$ACTIONS_FILE" | jq -r ".issues[$i].api")
              METHOD=$(echo "$ENDPOINT" | awk '{print $1}')
              PATH=$(echo "$ENDPOINT" | awk '{$1=""; print $0}' | sed 's/^ //')
              
              # Fetch endpoint details from the mapping file if available
              ENDPOINT_SCHEMA=$(cat .github/coverage-reports/api-mapping.json | jq -r --arg api "$API" --arg endpoint "$ENDPOINT" \
                '.api_definitions[$api].endpoints[$endpoint] // "Not available"')
              
              printf -v BODY '%s\n' \
                "## Missing Endpoint Implementation" \
                "" \
                "**Endpoint:** \`$ENDPOINT\`" \
                "**API:** \`$API\`" \
                "**Method:** \`$METHOD\`" \
                "**Path:** \`$PATH\`" \
                "" \
                "This endpoint was identified as missing in the API coverage report." \
                "" \
                "### API Endpoint Details" \
                "\`\`\`" \
                "$ENDPOINT_SCHEMA" \
                "\`\`\`" \
                "" \
                "### Implementation Checklist" \
                "- Review the GBIF API documentation for this endpoint" \
                "- **Bump dev version** in DESCRIPTION file (e.g., 3.7.9.91 → 3.7.9.92)" \
                "- Create corresponding R function following rgbif conventions:" \
                "  - Use snake_case for function name" \
                "  - Include \`curlopts = list(http_version = 2)\` parameter" \
                "  - Add proper parameter validation with \`assert()\`" \
                "  - Use helper functions from zzz.R (e.g., \`rgbif_compact()\`, \`gbif_GET()\`)" \
                "  - Format arguments with each on its own line" \
                "- Add complete roxygen2 documentation:" \
                "  - \`@export\` tag" \
                "  - \`@param\` for each parameter" \
                "  - \`@return\` describing return value" \
                "  - \`@examples\` with runnable code" \
                "  - \`@family\` tag for function grouping" \
                "- Add comprehensive tests in tests/testthat/" \
                "- Update .github/coverage-reports/api-mapping.json with new mapping" \
                "- **Reference this issue number (#ISSUE_NUMBER) in your PR title or description**" \
                "- **Do NOT update NEWS.md** - maintainers will handle this" \
                "" \
                "### Code Template" \
                "\`\`\`r" \
                "# Example structure (adjust as needed)" \
                "function_name <- function(param1 = NULL," \
                "  param2 = NULL," \
                "  curlopts = list(http_version = 2)) {" \
                "  " \
                "  # Validate parameters" \
                "  assert(param1, \"character\")" \
                "  " \
                "  # Build URL" \
                "  url <- paste0(gbif_base(), '$PATH')" \
                "  " \
                "  # Compact arguments" \
                "  args <- rgbif_compact(list(" \
                "    param1 = param1," \
                "    param2 = param2" \
                "  ))" \
                "  " \
                "  # Make request" \
                "  tt <- gbif_GET(url, args, TRUE, curlopts)" \
                "  " \
                "  # Return structured data" \
                "  return(tt)" \
                "}" \
                "\`\`\`" \
                "" \
                "### Resources" \
                "- [GBIF API Docs](https://techdocs.gbif.org/)"
              
              # Add OpenAPI spec link only if API is known
              if [ "$API" != "unknown" ] && [ -n "$API" ]; then
                printf -v BODY '%s\n%s\n' "$BODY" "- [OpenAPI Spec](https://techdocs.gbif.org/openapi/$API.json)"
              fi
              
              printf -v BODY '%s\n' "$BODY" \
                "- [Copilot Instructions](.github/copilot-instructions.md)" \
                "" \
                "### Important Reminders for Copilot" \
                "⚠️ **Always bump the dev version in DESCRIPTION before implementing**" \
                "⚠️ **Reference this issue (#ISSUE_NUMBER) in your PR**" \
                "⚠️ **Follow the code style in copilot-instructions.md**" \
                "" \
                "---" \
                "*This issue was automatically created by the API Coverage workflow*"
            else
              FUNCTION=$(cat "$ACTIONS_FILE" | jq -r ".issues[$i].function_name")
              ENDPOINT=$(cat "$ACTIONS_FILE" | jq -r ".issues[$i].endpoint")
              API=$(cat "$ACTIONS_FILE" | jq -r ".issues[$i].api // \"unknown\"")
              
              # Get parameters array with details
              PARAMS_LIST=$(cat "$ACTIONS_FILE" | jq -r ".issues[$i].parameters[]")
              PARAMS_MD=$(echo "$PARAMS_LIST" | sed 's/^/- `/' | sed 's/$/`/')
              
              # Build parameter list for code example
              PARAMS_FOR_EXAMPLE=""
              PARAMS_FOR_ARGS=""
              for param in $PARAMS_LIST; do
                PARAMS_FOR_EXAMPLE="${PARAMS_FOR_EXAMPLE}  $param = NULL,  # Add this parameter\\n"
                PARAMS_FOR_ARGS="${PARAMS_FOR_ARGS}    $param = $param,\\n"
              done
              # Remove trailing comma and newline
              PARAMS_FOR_EXAMPLE=$(echo -e "$PARAMS_FOR_EXAMPLE" | sed '$ s/,$//')
              PARAMS_FOR_ARGS=$(echo -e "$PARAMS_FOR_ARGS" | sed '$ s/,$//')
              
              # Try to fetch parameter schema details from OpenAPI
              PARAM_DETAILS=""
              HAS_DETAILS=false
              for param in $PARAMS_LIST; do
                PARAM_INFO=$(cat .github/coverage-reports/api-mapping.json | jq -r \
                  --arg api "$API" --arg endpoint "$ENDPOINT" --arg param "$param" \
                  '.api_definitions[$api].endpoints[$endpoint].parameters[$param] // empty' 2>/dev/null || echo "")
                if [ -n "$PARAM_INFO" ]; then
                  PARAM_DETAILS="${PARAM_DETAILS}\n- **\`$param\`**: $PARAM_INFO"
                  HAS_DETAILS=true
                fi
              done
              
              # Set default message if no details found
              if [ "$HAS_DETAILS" = false ]; then
                PARAM_DETAILS="*Parameter schema details not available in mapping file. Please check the OpenAPI specification linked below for parameter types, descriptions, and constraints.*"
              fi
              
              printf -v BODY '%s\n' \
                "## Missing Parameters Implementation" \
                "" \
                "**Function:** \`$FUNCTION\`" \
                "**Endpoint:** \`$ENDPOINT\`"
              
              # Only show API if it's not unknown
              if [ "$API" != "unknown" ] && [ -n "$API" ]; then
                printf -v BODY '%s\n' "$BODY" "**API:** \`$API\`"
              fi
              
              printf -v BODY '%s\n' "$BODY" \
                "" \
                "The following parameters were identified as missing from the rgbif function:" \
                "" \
                "$PARAMS_MD" \
                "" \
                "### Parameter Details" \
                "$(echo -e \"$PARAM_DETAILS\")" \
                "" \
                "### Implementation Checklist" \
                "- Review the GBIF API documentation for these parameters" \
                "- **Bump dev version** in DESCRIPTION file (e.g., 3.7.9.91 → 3.7.9.92)" \
                "- Add parameters to the function signature:" \
                "  - Use camelCase for parameter names (e.g., \`publishingCountry\`, \`datasetKey\`)" \
                "  - Set default to \`NULL\` for optional parameters" \
                "  - Format with each parameter on its own line" \
                "- Add parameter validation with \`assert()\` if needed" \
                "- Update the API call to include new parameters in \`rgbif_compact()\` list" \
                "- Add complete roxygen2 \`@param\` documentation for each parameter:" \
                "  - Include parameter type" \
                "  - Describe what the parameter does" \
                "  - Mention if it's optional or required" \
                "  - Note any valid values or constraints" \
                "- Update .github/coverage-reports/api-mapping.json with parameter mappings" \
                "- Add/update tests to cover the new parameters" \
                "- **Reference this issue number (#ISSUE_NUMBER) in your PR title or description**" \
                "- **Do NOT update NEWS.md** - maintainers will handle this" \
                "" \
                "### Example Parameter Addition" \
                "\`\`\`r" \
                "# Before" \
                "$FUNCTION <- function(existingParam = NULL," \
                "  curlopts = list(http_version = 2)) {" \
                "  ..." \
                "}" \
                "" \
                "# After - add the missing parameters" \
                "$FUNCTION <- function(existingParam = NULL," \
                "$PARAMS_FOR_EXAMPLE" \
                "  curlopts = list(http_version = 2)) {" \
                "  " \
                "  # Add validation if needed" \
                "  # assert(paramName, \"character\")" \
                "  " \
                "  # Add to args list" \
                "  args <- rgbif_compact(list(" \
                "    existingParam = existingParam," \
                "$PARAMS_FOR_ARGS" \
                "  ))" \
                "  ..." \
                "}" \
                "\`\`\`" \
                "" \
                "### Roxygen2 Documentation Example" \
                "\`\`\`r" \
                "#' @param paramName (type) Description of what this parameter does." \
                "#'   Optional/Required parameter for filtering/sorting results." \
                "\`\`\`" \
                "" \
                "### Resources" \
                "- [GBIF API Docs](https://techdocs.gbif.org/)"
              
              # Add OpenAPI spec link only if API is known
              if [ "$API" != "unknown" ] && [ -n "$API" ]; then
                printf -v BODY '%s\n' "$BODY" "- [OpenAPI Spec](https://techdocs.gbif.org/openapi/$API.json)"
              fi
              
              printf -v BODY '%s\n' "$BODY" \
                "- [Function Documentation](https://docs.ropensci.org/rgbif/reference/$FUNCTION.html)" \
                "- [Copilot Instructions](.github/copilot-instructions.md)" \
                "" \
                "### Important Reminders for Copilot" \
                "⚠️ **Always bump the dev version in DESCRIPTION before implementing**" \
                "⚠️ **Reference this issue (#ISSUE_NUMBER) in your PR**" \
                "⚠️ **Follow the code style in copilot-instructions.md**" \
                "⚠️ **Use camelCase for parameter names, not snake_case**" \
                "" \
                "---" \
                "*This issue was automatically created by the API Coverage workflow*"
            fi
            
            # Check if issue already exists
            EXISTING_URL=$(gh issue list --label "$LABELS" --search "$TITLE" --limit 1 2>/dev/null | head -n 1 | awk '{print $1}' || echo "")
            
            if [ -n "$EXISTING_URL" ]; then
              EXISTING="${EXISTING_URL##*/}"
            else
              EXISTING=""
            fi
            
            if [ -n "$EXISTING" ]; then
              echo "[SKIP] Issue already exists: #$EXISTING - $TITLE"
            else
              # Create the issue
              ISSUE_URL=$(gh issue create \
                --title "$TITLE" \
                --body "$BODY" \
                --label "$LABELS")
              
              if [ -n "$ISSUE_URL" ]; then
                ISSUE_NUMBER="${ISSUE_URL##*/}"
                echo "[OK] Created issue #$ISSUE_NUMBER: $TITLE"
                
                # Update the issue body to replace placeholder with actual issue number
                UPDATED_BODY=$(echo "$BODY" | sed "s/#ISSUE_NUMBER/#$ISSUE_NUMBER/g")
                gh issue edit "$ISSUE_NUMBER" --body "$UPDATED_BODY" 2>/dev/null || echo "[WARNING] Could not update issue #$ISSUE_NUMBER with actual issue number"
                
                echo "- Created issue #$ISSUE_NUMBER: $TITLE" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Show dry run message
        if: inputs.dry_run == true
        run: |
          echo "### Dry Run Mode" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[WARNING] Running in dry run mode - no issues created and no changes committed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Review the changes in api-mapping.json and actions-to-take.json" >> $GITHUB_STEP_SUMMARY
          
      - name: Commit changes
        if: inputs.dry_run == false
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Build list of files to check and commit
          FILES_TO_CHECK=""
          if [ -f .github/coverage-reports/api-mapping.json ]; then
            FILES_TO_CHECK="$FILES_TO_CHECK .github/coverage-reports/api-mapping.json"
          fi
          if [ -f .github/coverage-reports/coverage-report.md ]; then
            FILES_TO_CHECK="$FILES_TO_CHECK .github/coverage-reports/coverage-report.md"
          fi
          if [ -f .github/coverage-reports/actions-to-take.json ]; then
            FILES_TO_CHECK="$FILES_TO_CHECK .github/coverage-reports/actions-to-take.json"
          fi
          
          if [ -z "$FILES_TO_CHECK" ]; then
            echo "No files to check for changes"
            echo "No files to check for changes" >> $GITHUB_STEP_SUMMARY
          elif git diff --quiet HEAD -- $FILES_TO_CHECK 2>/dev/null; then
            echo "No changes to commit"
            echo "No changes to commit" >> $GITHUB_STEP_SUMMARY
          else
            # Add all files that exist and have changes
            git add $FILES_TO_CHECK
            
            git commit -m "chore: process API coverage actions" \
              -m "" \
              -m "- Updated ignored_parameters and ignored_endpoints in api-mapping.json" \
              -m "- Reset checkboxes in coverage-report.md" \
              -m "- Created GitHub issues for marked parameters/endpoints" \
              -m "" \
              -m "[skip ci]"
            
            git push
            
            echo "### Changes Committed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "[OK] Updated api-mapping.json and reset coverage-report.md" >> $GITHUB_STEP_SUMMARY
          fi
          
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-actions-results
          path: |
            .github/coverage-reports/actions-to-take.json
            .github/coverage-reports/api-mapping.json
            .github/coverage-reports/coverage-report.md
          retention-days: 30
